<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Backend Course App</title>
  <link rel="stylesheet" href="/css/styles.css">
</head>
<body>
  <header class="header">
    <div class="container header-inner">
      <h1>Backend Course App</h1>
      <p class="subtitle">Posts &amp; user auth demo</p>
    </div>
  </header>

  <main class="container">
    <nav class="tabs" role="tablist">
      <button class="tab active" data-tab="posts" role="tab" aria-selected="true">Posts</button>
      <button class="tab" data-tab="auth" role="tab" aria-selected="false">Auth</button>
    </nav>

    <div id="status" class="status" hidden></div>

    <!-- Posts -->
    <section id="posts-panel" class="panel active" role="tabpanel">
      <div class="grid">
        <article class="card">
          <h2>Create Post</h2>
          <form id="create-post-form" class="form">
            <label>
              Name
              <input type="text" name="name" required placeholder="Post title">
            </label>
            <label>
              Description
              <textarea name="description" required rows="3" placeholder="Post description"></textarea>
            </label>
            <label>
              Age
              <input type="number" name="age" required min="0" placeholder="25">
            </label>
            <button type="submit" class="btn btn-primary">Create Post</button>
          </form>
        </article>

        <article class="card">
          <div class="card-header">
            <h2>All Posts</h2>
            <button id="refresh-posts" class="btn btn-secondary" type="button">Refresh</button>
          </div>
          <div id="posts-list" class="posts-list">
            <p class="empty">Loading posts...</p>
          </div>
        </article>
      </div>
    </section>

    <!-- Auth -->
    <section id="auth-panel" class="panel" role="tabpanel" hidden>
      <div class="grid">
        <article class="card">
          <h2>Register</h2>
          <form id="register-form" class="form">
            <label>
              Username
              <input type="text" name="username" required minlength="3" placeholder="johndoe">
            </label>
            <label>
              Email
              <input type="email" name="email" required placeholder="john@example.com">
            </label>
            <label>
              Password
              <input type="password" name="password" required minlength="8" placeholder="Min. 8 characters">
            </label>
            <button type="submit" class="btn btn-primary">Register</button>
          </form>
        </article>

        <article class="card">
          <h2>Login</h2>
          <form id="login-form" class="form">
            <label>
              Email
              <input type="email" name="email" required placeholder="john@example.com">
            </label>
            <label>
              Password
              <input type="password" name="password" required placeholder="Your password">
            </label>
            <button type="submit" class="btn btn-primary">Login</button>
          </form>
        </article>

        <article class="card">
          <h2>Session</h2>
          <div id="session-info" class="session-info">
            <p class="empty">Not logged in</p>
          </div>
          <form id="logout-form" class="form">
            <label>
              Email
              <input type="email" name="email" required placeholder="Email to log out">
            </label>
            <button type="submit" class="btn btn-danger">Logout</button>
          </form>
        </article>
      </div>
    </section>
  </main>

  <template id="post-template">
    <article class="post-item">
      <div class="post-content">
        <h3 class="post-name"></h3>
        <p class="post-description"></p>
        <p class="post-meta"></p>
      </div>
      <div class="post-actions">
        <button class="btn btn-secondary btn-sm edit-btn" type="button">Edit</button>
        <button class="btn btn-danger btn-sm delete-btn" type="button">Delete</button>
      </div>
      <form class="edit-form form" hidden>
        <label>
          Name
          <input type="text" name="name">
        </label>
        <label>
          Description
          <textarea name="description" rows="2"></textarea>
        </label>
        <label>
          Age
          <input type="number" name="age" min="0">
        </label>
        <div class="inline-actions">
          <button type="submit" class="btn btn-primary btn-sm">Save</button>
          <button type="button" class="btn btn-secondary btn-sm cancel-edit-btn">Cancel</button>
        </div>
      </form>
    </article>
  </template>

  <script type="module" src="/js/app.js"></script>
</body>
</html>
